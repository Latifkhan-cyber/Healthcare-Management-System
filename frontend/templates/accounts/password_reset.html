{% extends 'base/base.html' %}
{% block public_content %}
<div class="auth-wrapper">
    <div class="auth-card">
        <div class="form-header auth-header">
            <div class="auth-icon">
                <i class="fas fa-key"></i>
            </div>
            <h2>Reset Password</h2>
            <p>Enter your email address and we'll send you a link to reset your password.</p>
        </div>

        <form method="post">
            {% csrf_token %}
            <div class="form-group">
                <label for="id_email">Email Address</label>
                <input type="email" name="email" id="id_email" class="form-control"
                       placeholder="Enter your registered email" required>
                {% if form.email.errors %}
                    <div class="form-error">{{ form.email.errors.0 }}</div>
                {% endif %}
            </div>
            <button type="submit" class="btn-primary btn-lg" style="width: 100%; justify-content: center; margin-top: 8px;">
                <i class="fas fa-paper-plane"></i>
                Send Reset Link
            </button>
        </form>

        <div class="auth-footer">
            <a href="{% url 'login' %}"><i class="fas fa-arrow-left"></i> Back to Login</a>
        </div>
    </div>
</div>

<style>
    input[type="email"] {
        width: 100%;
        padding: 11px 14px;
        border: 1.5px solid var(--gray-200);
        border-radius: var(--border-radius);
        font-size: 0.9rem;
        font-family: var(--font-sans);
        transition: all var(--transition-base);
    }
    input:focus {
        outline: none;
        border-color: var(--primary-400);
        box-shadow: 0 0 0 3px rgba(20, 184, 166, 0.1);
    }
</style>
{% endblock %}
