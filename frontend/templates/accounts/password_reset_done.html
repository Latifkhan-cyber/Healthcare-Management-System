{% extends 'base/base.html' %}
{% block public_content %}
<div class="auth-wrapper">
    <div class="auth-card">
        <div class="form-header auth-header">
            <div class="auth-icon" style="background: var(--success-bg); color: var(--success);">
                <i class="fas fa-envelope-open-text"></i>
            </div>
            <h2>Check Your Email</h2>
            <p>We've sent a password reset link to your email address.</p>
        </div>

        <div style="text-align: center; padding: 20px 0;">
            <p style="color: var(--gray-600); font-size: 0.9rem; line-height: 1.6;">
                If you don't see the email, check your spam folder.
                <br>In development mode, the email is printed to the <strong>terminal</strong>.
            </p>
        </div>

        <div class="auth-footer" style="text-align: center;">
            <a href="{% url 'login' %}"><i class="fas fa-arrow-left"></i> Back to Login</a>
        </div>
    </div>
</div>
{% endblock %}
