{% extends 'base/base.html' %}
{% block page_title %}Notification Preferences{% endblock %}
{% block page_subtitle %}Choose how you want to receive notifications{% endblock %}

{% block content %}
<div class="data-card animate-fade-in-up" style="max-width: 600px;">
    <div class="data-card-header">
        <h3><i class="fas fa-bell" style="margin-right: 8px;"></i>Notification Preferences</h3>
    </div>

    <form method="post" style="padding: 0;">
        {% csrf_token %}

        <div style="padding: 16px 0; border-bottom: 1px solid var(--gray-200);">
            <h4 style="margin: 0 0 12px; font-size: 0.95rem; color: var(--gray-700);">Delivery Channels</h4>
            <label style="display: flex; align-items: center; justify-content: space-between; padding: 8px 0; cursor: pointer;">
                <div>
                    <div style="font-weight: 600; font-size: 0.9rem;">Email Notifications</div>
                    <div style="font-size: 0.75rem; color: var(--gray-400);">Receive notifications via email at {{ request.user.email|default:"(not set)" }}</div>
                </div>
                <input type="checkbox" name="email_enabled" {% if prefs.email_enabled %}checked{% endif %} style="width: 18px; height: 18px; accent-color: #0d9488;">
            </label>
            <label style="display: flex; align-items: center; justify-content: space-between; padding: 8px 0; cursor: pointer;">
                <div>
                    <div style="font-weight: 600; font-size: 0.9rem;">SMS Notifications</div>
                    <div style="font-size: 0.75rem; color: var(--gray-400);">Receive notifications via SMS at {{ request.user.phone|default:"(not set)" }}</div>
                </div>
                <input type="checkbox" name="sms_enabled" {% if prefs.sms_enabled %}checked{% endif %} style="width: 18px; height: 18px; accent-color: #0d9488;">
            </label>
        </div>

        <div style="padding: 16px 0;">
            <h4 style="margin: 0 0 12px; font-size: 0.95rem; color: var(--gray-700);">Notification Types</h4>
            <label style="display: flex; align-items: center; justify-content: space-between; padding: 8px 0; cursor: pointer;">
                <div>
                    <div style="font-weight: 600; font-size: 0.9rem;">Appointment Reminders</div>
                    <div style="font-size: 0.75rem; color: var(--gray-400);">Reminders about upcoming or cancelled appointments</div>
                </div>
                <input type="checkbox" name="appointment_reminders" {% if prefs.appointment_reminders %}checked{% endif %} style="width: 18px; height: 18px; accent-color: #0d9488;">
            </label>
            <label style="display: flex; align-items: center; justify-content: space-between; padding: 8px 0; cursor: pointer;">
                <div>
                    <div style="font-weight: 600; font-size: 0.9rem;">Queue Notifications</div>
                    <div style="font-size: 0.75rem; color: var(--gray-400);">"Your turn next" alerts in the waiting room</div>
                </div>
                <input type="checkbox" name="queue_notifications" {% if prefs.queue_notifications %}checked{% endif %} style="width: 18px; height: 18px; accent-color: #0d9488;">
            </label>
            <label style="display: flex; align-items: center; justify-content: space-between; padding: 8px 0; cursor: pointer;">
                <div>
                    <div style="font-weight: 600; font-size: 0.9rem;">Lab Results</div>
                    <div style="font-size: 0.75rem; color: var(--gray-400);">Notifications when lab test results are ready</div>
                </div>
                <input type="checkbox" name="lab_results" {% if prefs.lab_results %}checked{% endif %} style="width: 18px; height: 18px; accent-color: #0d9488;">
            </label>
            <label style="display: flex; align-items: center; justify-content: space-between; padding: 8px 0; cursor: pointer;">
                <div>
                    <div style="font-weight: 600; font-size: 0.9rem;">Follow-Up Reminders</div>
                    <div style="font-size: 0.75rem; color: var(--gray-400);">Reminders when follow-up appointments are due</div>
                </div>
                <input type="checkbox" name="follow_up_reminders" {% if prefs.follow_up_reminders %}checked{% endif %} style="width: 18px; height: 18px; accent-color: #0d9488;">
            </label>
            <label style="display: flex; align-items: center; justify-content: space-between; padding: 8px 0; cursor: pointer;">
                <div>
                    <div style="font-weight: 600; font-size: 0.9rem;">Payment Notifications</div>
                    <div style="font-size: 0.75rem; color: var(--gray-400);">Payment received and verification alerts</div>
                </div>
                <input type="checkbox" name="payment_notifications" {% if prefs.payment_notifications %}checked{% endif %} style="width: 18px; height: 18px; accent-color: #0d9488;">
            </label>
            <label style="display: flex; align-items: center; justify-content: space-between; padding: 8px 0; cursor: pointer;">
                <div>
                    <div style="font-weight: 600; font-size: 0.9rem;">General Notifications</div>
                    <div style="font-size: 0.75rem; color: var(--gray-400);">System announcements and general updates</div>
                </div>
                <input type="checkbox" name="general_notifications" {% if prefs.general_notifications %}checked{% endif %} style="width: 18px; height: 18px; accent-color: #0d9488;">
            </label>
        </div>

        <div style="padding: 16px 0;">
            <button type="submit" class="btn-primary" style="border: none; cursor: pointer; width: 100%;">
                <i class="fas fa-save"></i> Save Preferences
            </button>
        </div>
    </form>
</div>
{% endblock %}
