{% extends 'base/base.html' %}
{% block page_title %}Register Patient{% endblock %}
{% block page_subtitle %}Register a new patient account{% endblock %}

{% block content %}
<div class="animate-fade-in-up" style="max-width: 700px; margin: 0 auto;">
    <div class="form-card">
        <div class="form-header">
            <div class="icon" style="background: var(--info-bg); color: var(--info);">
                <i class="fas fa-user-plus"></i>
            </div>
            <h2>Register New Patient</h2>
            <p>Create a patient account. Default password: <strong>patient123</strong></p>
        </div>

        <form method="post">
            {% csrf_token %}
            <div class="form-row">
                <div class="form-group">
                    <label>First Name *</label>
                    <input type="text" name="first_name" class="form-control" placeholder="First name" required>
                </div>
                <div class="form-group">
                    <label>Last Name *</label>
                    <input type="text" name="last_name" class="form-control" placeholder="Last name" required>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Username *</label>
                    <input type="text" name="username" class="form-control" placeholder="Choose a username" required>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" name="email" class="form-control" placeholder="patient@email.com">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Phone</label>
                    <input type="text" name="phone" class="form-control" placeholder="e.g., 0300-1234567">
                </div>
                <div class="form-group">
                    <label>Gender</label>
                    <select name="gender" class="form-control">
                        <option value="">-- Select --</option>
                        <option value="MALE">Male</option>
                        <option value="FEMALE">Female</option>
                        <option value="OTHER">Other</option>
                    </select>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Date of Birth</label>
                    <input type="date" name="date_of_birth" class="form-control">
                </div>
                <div class="form-group">
                    <label>Address</label>
                    <input type="text" name="address" class="form-control" placeholder="Patient address">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Password *</label>
                    <input type="password" name="password1" class="form-control" placeholder="Set password" required>
                </div>
                <div class="form-group">
                    <label>Confirm Password *</label>
                    <input type="password" name="password2" class="form-control" placeholder="Confirm password" required>
                </div>
            </div>

            <div style="display: flex; gap: 12px; margin-top: 8px;">
                <a href="{% url 'clinic:patient_lookup' %}" class="btn-secondary" style="flex: 1; justify-content: center;">
                    <i class="fas fa-arrow-left"></i> Cancel
                </a>
                <button type="submit" class="btn-primary btn-lg" style="flex: 1; justify-content: center;">
                    <i class="fas fa-user-plus"></i> Register Patient
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
