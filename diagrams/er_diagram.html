<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ER Diagram - Healthcare Management System</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0f172a; font-family: 'Segoe UI', system-ui, sans-serif; padding: 40px; min-height: 100vh; }
  .container { max-width: 1200px; margin: 0 auto; }
  h1 { color: #e2e8f0; text-align: center; font-size: 1.8rem; margin-bottom: 8px; }
  .subtitle { color: #64748b; text-align: center; font-size: 0.9rem; margin-bottom: 30px; }
  .diagram-container { background: #1e293b; border-radius: 16px; padding: 40px; border: 1px solid #334155; overflow-x: auto; }
  svg { display: block; margin: 0 auto; max-width: 100%; height: auto; }
  .legend { display: flex; justify-content: center; gap: 24px; margin-top: 20px; flex-wrap: wrap; }
  .legend-item { display: flex; align-items: center; gap: 8px; color: #94a3b8; font-size: 0.8rem; }
  .legend-line { width: 30px; height: 2px; }
</style>
</head>
<body>
<div class="container">
  <h1>Entity-Relationship Diagram</h1>
  <p class="subtitle">Healthcare Management System — 12 Entities with Relationships</p>
  <div class="diagram-container">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 850" width="1100" height="850">
      <rect width="1100" height="850" fill="#0f172a" rx="12"/>
      
      <defs>
        <marker id="one" markerWidth="10" markerHeight="8" refX="10" refY="4" orient="auto"><path d="M0,0 L10,4 L0,8" fill="#64748b"/></marker>
        <marker id="many" markerWidth="10" markerHeight="8" refX="10" refY="4" orient="auto"><path d="M0,2 L10,4 L0,6 M0,2 L0,6" fill="none" stroke="#64748b" stroke-width="1.5"/></marker>
      </defs>
      
      <!-- ===== ENTITIES ===== -->
      
      <!-- User (Center) -->
      <rect x="420" y="340" width="180" height="90" rx="8" fill="rgba(99,102,241,0.2)" stroke="#818cf8" stroke-width="2"/>
      <rect x="420" y="340" width="180" height="28" rx="8" fill="rgba(99,102,241,0.3)" stroke="#818cf8" stroke-width="2"/>
      <text x="510" y="360" fill="#e2e8f0" font-size="11" text-anchor="middle" font-weight="700">User</text>
      <text x="430" y="382" fill="#94a3b8" font-size="8">PK: id</text>
      <text x="430" y="394" fill="#94a3b8" font-size="8">username, role</text>
      <text x="430" y="406" fill="#94a3b8" font-size="8">patient_id, email</text>
      <text x="430" y="418" fill="#94a3b8" font-size="8">phone, specialization</text>
      
      <!-- NotificationPreference -->
      <rect x="420" y="100" width="180" height="80" rx="8" fill="rgba(136,19,55,0.15)" stroke="#fb7185" stroke-width="1.5"/>
      <rect x="420" y="100" width="180" height="26" rx="8" fill="rgba(136,19,55,0.25)" stroke="#fb7185" stroke-width="1.5"/>
      <text x="510" y="119" fill="#e2e8f0" font-size="10" text-anchor="middle" font-weight="700">NotificationPreference</text>
      <text x="430" y="140" fill="#94a3b8" font-size="7.5">PK: id</text>
      <text x="430" y="152" fill="#94a3b8" font-size="7.5">FK: user_id</text>
      <text x="430" y="164" fill="#94a3b8" font-size="7.5">email_enabled</text>
      <text x="430" y="176" fill="#94a3b8" font-size="7.5">sms_enabled</text>
      
      <!-- Appointment -->
      <rect x="750" y="200" width="180" height="90" rx="8" fill="rgba(34,211,238,0.15)" stroke="#22d3ee" stroke-width="1.5"/>
      <rect x="750" y="200" width="180" height="26" rx="8" fill="rgba(34,211,238,0.25)" stroke="#22d3ee" stroke-width="1.5"/>
      <text x="840" y="219" fill="#e2e8f0" font-size="10" text-anchor="middle" font-weight="700">Appointment</text>
      <text x="760" y="240" fill="#94a3b8" font-size="7.5">PK: id</text>
      <text x="760" y="252" fill="#94a3b8" font-size="7.5">FK: patient_id</text>
      <text x="760" y="264" fill="#94a3b8" font-size="7.5">FK: doctor_id</text>
      <text x="760" y="276" fill="#94a3b8" font-size="7.5">date, time_slot, status</text>
      
      <!-- QueueToken -->
      <rect x="750" y="380" width="180" height="80" rx="8" fill="rgba(34,211,238,0.15)" stroke="#22d3ee" stroke-width="1.5"/>
      <rect x="750" y="380" width="180" height="26" rx="8" fill="rgba(34,211,238,0.25)" stroke="#22d3ee" stroke-width="1.5"/>
      <text x="840" y="399" fill="#e2e8f0" font-size="10" text-anchor="middle" font-weight="700">QueueToken</text>
      <text x="760" y="420" fill="#94a3b8" font-size="7.5">PK: id</text>
      <text x="760" y="432" fill="#94a3b8" font-size="7.5">FK: appointment_id</text>
      <text x="760" y="444" fill="#94a3b8" font-size="7.5">token_number</text>
      <text x="760" y="456" fill="#94a3b8" font-size="7.5">estimated_wait_min</text>
      
      <!-- Payment -->
      <rect x="750" y="540" width="180" height="80" rx="8" fill="rgba(52,211,153,0.15)" stroke="#34d399" stroke-width="1.5"/>
      <rect x="750" y="540" width="180" height="26" rx="8" fill="rgba(52,211,153,0.25)" stroke="#34d399" stroke-width="1.5"/>
      <text x="840" y="559" fill="#e2e8f0" font-size="10" text-anchor="middle" font-weight="700">Payment</text>
      <text x="760" y="580" fill="#94a3b8" font-size="7.5">PK: id</text>
      <text x="760" y="592" fill="#94a3b8" font-size="7.5">FK: appointment_id</text>
      <text x="760" y="604" fill="#94a3b8" font-size="7.5">amount, method, status</text>
      
      <!-- PatientHistory -->
      <rect x="100" y="200" width="180" height="90" rx="8" fill="rgba(251,191,36,0.15)" stroke="#fbbf24" stroke-width="1.5"/>
      <rect x="100" y="200" width="180" height="26" rx="8" fill="rgba(251,191,36,0.25)" stroke="#fbbf24" stroke-width="1.5"/>
      <text x="190" y="219" fill="#e2e8f0" font-size="10" text-anchor="middle" font-weight="700">PatientHistory</text>
      <text x="110" y="240" fill="#94a3b8" font-size="7.5">PK: id</text>
      <text x="110" y="252" fill="#94a3b8" font-size="7.5">FK: patient_id</text>
      <text x="110" y="264" fill="#94a3b8" font-size="7.5">FK: doctor_id</text>
      <text x="110" y="276" fill="#94a3b8" font-size="7.5">FK: appointment_id</text>
      <text x="110" y="288" fill="#94a3b8" font-size="7.5">diagnosis, prescription</text>
      
      <!-- LabTest -->
      <rect x="100" y="380" width="180" height="80" rx="8" fill="rgba(251,191,36,0.15)" stroke="#fbbf24" stroke-width="1.5"/>
      <rect x="100" y="380" width="180" height="26" rx="8" fill="rgba(251,191,36,0.25)" stroke="#fbbf24" stroke-width="1.5"/>
      <text x="190" y="399" fill="#e2e8f0" font-size="10" text-anchor="middle" font-weight="700">LabTest</text>
      <text x="110" y="420" fill="#94a3b8" font-size="7.5">PK: id</text>
      <text x="110" y="432" fill="#94a3b8" font-size="7.5">FK: patient_id</text>
      <text x="110" y="444" fill="#94a3b8" font-size="7.5">FK: history_id</text>
      <text x="110" y="456" fill="#94a3b8" font-size="7.5">test_name, status</text>
      
      <!-- LabTestCategory -->
      <rect x="100" y="540" width="180" height="70" rx="8" fill="rgba(251,191,36,0.15)" stroke="#fbbf24" stroke-width="1.5"/>
      <rect x="100" y="540" width="180" height="26" rx="8" fill="rgba(251,191,36,0.25)" stroke="#fbbf24" stroke-width="1.5"/>
      <text x="190" y="559" fill="#e2e8f0" font-size="10" text-anchor="middle" font-weight="700">LabTestCategory</text>
      <text x="110" y="580" fill="#94a3b8" font-size="7.5">PK: id</text>
      <text x="110" y="592" fill="#94a3b8" font-size="7.5">name, category, cost</text>
      
      <!-- Notification -->
      <rect x="420" y="540" width="180" height="90" rx="8" fill="rgba(136,19,55,0.15)" stroke="#fb7185" stroke-width="1.5"/>
      <rect x="420" y="540" width="180" height="26" rx="8" fill="rgba(136,19,55,0.25)" stroke="#fb7185" stroke-width="1.5"/>
      <text x="510" y="559" fill="#e2e8f0" font-size="10" text-anchor="middle" font-weight="700">Notification</text>
      <text x="430" y="580" fill="#94a3b8" font-size="7.5">PK: id</text>
      <text x="430" y="592" fill="#94a3b8" font-size="7.5">FK: recipient_id</text>
      <text x="430" y="604" fill="#94a3b8" font-size="7.5">type, title, message</text>
      <text x="430" y="616" fill="#94a3b8" font-size="7.5">is_read, email_sent</text>
      <text x="430" y="628" fill="#94a3b8" font-size="7.5">sms_sent, delivery_error</text>
      
      <!-- DoctorReview -->
      <rect x="100" y="80" width="180" height="80" rx="8" fill="rgba(99,102,241,0.15)" stroke="#818cf8" stroke-width="1.5"/>
      <rect x="100" y="80" width="180" height="26" rx="8" fill="rgba(99,102,241,0.25)" stroke="#818cf8" stroke-width="1.5"/>
      <text x="190" y="99" fill="#e2e8f0" font-size="10" text-anchor="middle" font-weight="700">DoctorReview</text>
      <text x="110" y="120" fill="#94a3b8" font-size="7.5">PK: id</text>
      <text x="110" y="132" fill="#94a3b8" font-size="7.5">FK: patient_id</text>
      <text x="110" y="144" fill="#94a3b8" font-size="7.5">FK: doctor_id</text>
      <text x="110" y="156" fill="#94a3b8" font-size="7.5">FK: appointment_id, rating</text>
      
      <!-- DoctorSchedule -->
      <rect x="420" y="700" width="180" height="70" rx="8" fill="rgba(52,211,153,0.15)" stroke="#34d399" stroke-width="1.5"/>
      <rect x="420" y="700" width="180" height="26" rx="8" fill="rgba(52,211,153,0.25)" stroke="#34d399" stroke-width="1.5"/>
      <text x="510" y="719" fill="#e2e8f0" font-size="10" text-anchor="middle" font-weight="700">DoctorSchedule</text>
      <text x="430" y="740" fill="#94a3b8" font-size="7.5">PK: id</text>
      <text x="430" y="752" fill="#94a3b8" font-size="7.5">FK: doctor_id</text>
      <text x="430" y="764" fill="#94a3b8" font-size="7.5">day_of_week, times</text>
      
      <!-- PaymentSettings -->
      <rect x="750" y="700" width="180" height="70" rx="8" fill="rgba(99,102,241,0.15)" stroke="#818cf8" stroke-width="1.5"/>
      <rect x="750" y="700" width="180" height="26" rx="8" fill="rgba(99,102,241,0.25)" stroke="#818cf8" stroke-width="1.5"/>
      <text x="840" y="719" fill="#e2e8f0" font-size="10" text-anchor="middle" font-weight="700">PaymentSettings</text>
      <text x="760" y="740" fill="#94a3b8" font-size="7.5">PK: id</text>
      <text x="760" y="752" fill="#94a3b8" font-size="7.5">jazzcash_number</text>
      <text x="760" y="764" fill="#94a3b8" font-size="7.5">easypaisa_number</text>
      
      <!-- ===== RELATIONSHIPS ===== -->
      
      <!-- User 1 --- 1 NotificationPreference -->
      <line x1="510" y1="340" x2="510" y2="180" stroke="#fb7185" stroke-width="1.5"/>
      <text x="515" y="260" fill="#fb7185" font-size="8">1:1</text>
      
      <!-- User 1 --- N Appointment (as patient) -->
      <path d="M600,370 L750,250" stroke="#22d3ee" stroke-width="1.5" fill="none"/>
      <text x="680" y="300" fill="#22d3ee" font-size="8">1:N</text>
      <text x="680" y="312" fill="#64748b" font-size="7">patient</text>
      
      <!-- User 1 --- N Appointment (as doctor) -->
      <path d="M600,400 L750,230" stroke="#34d399" stroke-width="1.5" fill="none"/>
      <text x="680" y="350" fill="#34d399" font-size="8">1:N</text>
      <text x="680" y="362" fill="#64748b" font-size="7">doctor</text>
      
      <!-- Appointment 1 --- 1 QueueToken -->
      <line x1="840" y1="290" x2="840" y2="380" stroke="#22d3ee" stroke-width="1.5"/>
      <text x="848" y="340" fill="#22d3ee" font-size="8">1:1</text>
      
      <!-- Appointment 1 --- 1 Payment -->
      <line x1="840" y1="290" x2="840" y2="540" stroke="#34d399" stroke-width="1.5"/>
      <text x="848" y="420" fill="#34d399" font-size="8">1:1</text>
      
      <!-- Appointment 1 --- 1 PatientHistory -->
      <path d="M750,260 L280,250" stroke="#fbbf24" stroke-width="1.5" fill="none"/>
      <text x="500" y="240" fill="#fbbf24" font-size="8">1:1</text>
      
      <!-- User 1 --- N PatientHistory -->
      <path d="M420,380 L280,270" stroke="#fbbf24" stroke-width="1.5" fill="none"/>
      <text x="340" y="320" fill="#fbbf24" font-size="8">1:N</text>
      
      <!-- PatientHistory 1 --- N LabTest -->
      <line x1="190" y1="290" x2="190" y2="380" stroke="#fbbf24" stroke-width="1.5"/>
      <text x="198" y="340" fill="#fbbf24" font-size="8">1:N</text>
      
      <!-- User 1 --- N Notification -->
      <line x1="510" y1="430" x2="510" y2="540" stroke="#fb7185" stroke-width="1.5"/>
      <text x="518" y="490" fill="#fb7185" font-size="8">1:N</text>
      
      <!-- User 1 --- N DoctorReview -->
      <path d="M420,360 L280,130" stroke="#818cf8" stroke-width="1.5" fill="none"/>
      <text x="340" y="240" fill="#818cf8" font-size="8">1:N</text>
      
      <!-- User 1 --- N DoctorSchedule -->
      <path d="M510,430 L510,700" stroke="#34d399" stroke-width="1.5" fill="none"/>
      <text x="518" y="570" fill="#34d399" font-size="8">1:N</text>
      
      <!-- LabTest N --- 1 LabTestCategory -->
      <path d="M100,420 L50,420 L50,570 L100,570" stroke="#fbbf24" stroke-width="1" fill="none" stroke-dasharray="4,3"/>
      <text x="40" y="500" fill="#fbbf24" font-size="7">N:1</text>
      
      <!-- Legend -->
      <rect x="20" y="20" width="160" height="100" rx="8" fill="rgba(30,41,59,0.8)" stroke="#334155" stroke-width="1"/>
      <text x="100" y="40" fill="#e2e8f0" font-size="10" text-anchor="middle" font-weight="600">Legend</text>
      <line x1="35" y1="58" x2="65" y2="58" stroke="#818cf8" stroke-width="2"/>
      <text x="75" y="62" fill="#94a3b8" font-size="8">User</text>
      <line x1="35" y1="75" x2="65" y2="75" stroke="#22d3ee" stroke-width="2"/>
      <text x="75" y="79" fill="#94a3b8" font-size="8">Appointment</text>
      <line x1="35" y1="92" x2="65" y2="92" stroke="#fbbf24" stroke-width="2"/>
      <text x="75" y="96" fill="#94a3b8" font-size="8">Clinical</text>
      <line x1="35" y1="109" x2="65" y2="109" stroke="#fb7185" stroke-width="2"/>
      <text x="75" y="113" fill="#94a3b8" font-size="8">Notification</text>
    </svg>
  </div>
  <div class="legend">
    <div class="legend-item"><div class="legend-line" style="background: #818cf8;"></div>User & Reviews</div>
    <div class="legend-item"><div class="legend-line" style="background: #22d3ee;"></div>Appointment & Queue</div>
    <div class="legend-item"><div class="legend-line" style="background: #fbbf24;"></div>Clinical Records</div>
    <div class="legend-item"><div class="legend-line" style="background: #fb7185;"></div>Notification</div>
    <div class="legend-item"><div class="legend-line" style="background: #34d399;"></div>Payment & Schedule</div>
  </div>
</div>
</body>
</html>
